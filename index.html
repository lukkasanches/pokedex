<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Links -->
  <link rel="icon" href="./img/pokebola.webp">
  <link rel="stylesheet" href="./css/style.css">

  <!-- Main JS -->


  <title>Pokédex</title>
</head>

<body>

  <main>
    <img src="#" alt="pokemon" class="pokemon__image">

    <h1 class="pokemon__data">
      <span class="pokemon__number"></span> -
      <span class="pokemon__name"></span>
    </h1>

    <div class="pokemon_info">
      <p><strong>Tipo:</strong> <span class="pokemon_types"></span></p>
      <p><strong>Altura:</strong> <span class="pokemon_height"></span></p>
      <p><strong>Peso:</strong> <span class="pokemon_weight"></span></p>
    </div>

    <form class="form">
      <input type="search" class="input__search" placeholder="Nome ou número!" required />
    </form>

    <div class="buttons">
      <button class="button btn-prev">Prev &lt;</button>
      <button class="button btn-next">Next &gt;</button>
    </div>

    <img src="./img/pokedexm.png" alt="pokedex" class="pokedex">

  </main>

  <script>
    
async function buscarPokemon() {

    const nomePokemon = document
        .getElementById("pokemonInput")
        .value
        .toLowerCase()
        .trim();

    const resultado = document.getElementById("resultado");

    if (!nomePokemon) {
        resultado.innerHTML = "<p>Digite o nome de um Pokémon.</p>";
        return;
    }

    try {

        const response = await fetch(
            `https://pokeapi.co/api/v2/pokemon/${nomePokemon}`
        );

        if (!response.ok) {
            throw new Error("Pokémon não encontrado");
        }

        const pokemon = await response.json();

        resultado.innerHTML = `
            <h2>${pokemon.name.toUpperCase()}</h2>

            <img 
                src="${pokemon.sprites.front_default}" 
                alt="${pokemon.name}"
            >

            <p><strong>Tipo:</strong> ${
                pokemon.types.map(tipo => tipo.type.name).join(", ")
            }</p>

            <p><strong>Altura:</strong> ${pokemon.height}</p>

            <p><strong>Peso:</strong> ${pokemon.weight}</p>
        `;

    } catch (erro) {

        resultado.innerHTML = `
            <p style="color:red;">
                Pokémon não encontrado!
            </p>
        `;

        console.error(erro);
    }
}
  </script>

</body>

</html>
